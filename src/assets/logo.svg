<svg viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background circle for logo mark -->
  <circle cx="30" cy="30" r="28" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Decorative event elements -->
  <!-- Confetti/stars -->
  <g fill="#D4AF37">
    <circle cx="18" cy="15" r="2"/>
    <circle cx="42" cy="18" r="2"/>
    <circle cx="20" cy="45" r="2"/>
    <circle cx="40" cy="42" r="2"/>
  </g>
  
  <!-- Party elements - stylized -->
  <path d="M 25 25 L 35 25 L 35 35 L 25 35 Z" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
  <path d="M 28 20 L 32 20" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 28 40 L 32 40" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Company name -->
  <text x="65" y="25" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1F2937" letter-spacing="1">
    THE CREATURE
  </text>
  
  <text x="65" y="45" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#D4AF37" letter-spacing="1">
    EVENTS
  </text>
  
  <!-- Decorative line -->
  <line x1="65" y1="48" x2="240" y2="48" stroke="#D4AF37" stroke-width="1.5"/>
</svg>
